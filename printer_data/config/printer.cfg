[include mainsail.cfg]
[include macros.cfg]
[include SpeedTest.cfg]
#[include safe_home.cfg]
[endstop_phase]
[include klicky-probe.cfg]

[gcode_arcs]
resolution: 0.5
[respond]
[exclude_object]
[pause_resume]

[include ADXLSB.cfg]
#[include S2DW.cfg]

[virtual_sdcard]
path: /home/linaro/printer_data/gcodes/

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f401xc_2A005E001751383531393138-if00
#restart_method: command

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 5000
#max_accel_to_decel: 3000
max_z_velocity: 15
max_z_accel: 350
square_corner_velocity: 5.0

#####################################################################
#      X/Y Stepper Settings   X=B   Y=A
#####################################################################

[stepper_x]
step_pin: PC12
dir_pin: !PC10
enable_pin: !PD2
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 0 #120
position_max: 120
homing_speed: 30
homing_retract_dist: 0
#homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC11
diag_pin: PB3
run_current: 0.8
driver_SGTHRS: 90                                                  # this is set to 255 which is the MAX sensitivity for sensorless homing, you will need to tune this later
sense_resistor: 0.110
#stealthchop_threshold: 999999
interpolate: True


[stepper_y]
step_pin: PC15
dir_pin: !PC13
enable_pin: !PA10
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 0 #120
position_max: 120
homing_speed: 30
homing_retract_dist: 0
#homing_positive_dir: False

[tmc2209 stepper_y]
uart_pin: PC14
diag_pin: ^PA9
run_current: 0.8
driver_SGTHRS: 88
sense_resistor: 0.110
#stealthchop_threshold: 999999
interpolate: true

#[autotune_tmc stepper_x]
#motor: fysetc-35hsh7402-24b-60a
#tuning_goal: silent
#SG4_THRS: 200

#[autotune_tmc stepper_y]
#motor: fysetc-35hsh7402-24b-60b
#tuning_goal: silent
#SG4_THRS: 88

#[autotune_tmc stepper_z]
#motor: fysetc-42hsc1433b-200n8
#tuning_goal: performance

#[autotune_tmc extruder]
#motor: fysetc-g36hsy4405-6d-30
#tuning_goal: performance

#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PB2
dir_pin: PC5
enable_pin: !PB10
rotation_distance: 8
microsteps: 16
endstop_pin: probe:z_virtual_endstop #^PA3  #I/O3
#position_endstop: 118.365
position_max: 119
position_min: -1.5
homing_speed: 10
second_homing_speed: 5.0
homing_retract_dist: 2.0
#homing_positive_dir: True

[tmc2209 stepper_z]
uart_pin: PC4
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 999999                           
interpolate: True #False

[probe]
pin: PC3
x_offset: 0
y_offset: 17.25
#z_offset: 9.910
speed: 10
samples: 3
sample_retract_dist: 1
samples_tolerance_retries: 3
#samples_result: median

[bed_mesh]
zero_reference_position: 60,60
algorithm: bicubic
speed: 100
horizontal_move_z: 12
mesh_min: 5, 20
mesh_max: 115, 110
probe_count: 13, 11
mesh_pps: 1,1
fade_start: 10
fade_end: 20
fade_target: 0
split_delta_z: 0.025

#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: PB6
dir_pin: PB4
enable_pin: !PB7
full_steps_per_rotation: 200
rotation_distance: 23.02 #22.35 #23.52
gear_ratio: 50:10           
microsteps: 32
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC7
sensor_type: Generic 3950
sensor_pin: PC0
min_temp: 0
max_temp: 300
min_extrude_temp: 17
max_extrude_only_distance: 500
max_extrude_cross_section: 3

pressure_advance: 0.03 
pressure_advance_smooth_time: 0.010

control: pid #245
pid_Kp: 17.733
pid_Ki: 1.407
pid_Kd: 55.858

#control: pid #200
#pid_Kp: 16.633
#pid_Ki: 1.143
#pid_Kd: 60.502


[tmc2208 extruder]
uart_pin: PB5
run_current: 0.7
sense_resistor: 0.110
#stealthchop_threshold: 999999
interpolate: True


[input_shaper]
shaper_freq_x: 106.6
shaper_type_x: mzv
damping_ratio_x: 0.068

shaper_freq_y: 78
shaper_type_y: mzv
damping_ratio_y: 0.041


#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PC8
sensor_type: Generic 3950
sensor_pin: PB0
smooth_time: 3.0
max_power: 0.8
min_temp: 0
max_temp: 120

control: pid #105
pid_kp: 48.558
pid_ki: 1.740
pid_kd: 338.694

#control: pid #60
#pid_kp: 44.768
#pid_ki: 1.144
#pid_kd: 438.169


#####################################################################
# Fan Control
#####################################################################

[heater_fan hotend_fan]
# FAN1 Connector
pin: PA13
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
fan_speed: 1.0 

[fan]
# Print Cooling Fan: FAN0 Connector
pin: PA14
max_power: 1.0
kick_start_time: 0.5
off_below: 0.14
cycle_time: 0.010

[temperature_fan CM68_Fan]
pin: PA8
max_power: 1.0
min_temp: 10
max_temp: 100
kick_start_time: 0.5
off_below: 0.1
sensor_type: temperature_host
control: pid
pid_kp: 1.0
pid_ki: 0.5
pid_kd: 2.0
min_speed: 0.0
max_speed: 1.0
target_temp: 40


#####################################################################
#   Filament switch sensor
#####################################################################

#[filament_switch_sensor my_sensor]
#pause_on_runout: True
#runout_gcode: M600
#event_delay: 3.0
#switch_pin: ^PA2

#####################################################################
# Temperature Sensor
#####################################################################

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

#[temperature_sensor CM68]
#sensor_type: temperature_host
#min_temp: 10
#max_temp: 100

[temperature_sensor Tool_Head]
sensor_type: Generic 3950
sensor_pin: PA0
min_temp:0
max_temp:100

[temperature_sensor Bed_2]
sensor_pin: PB1
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 120

[temperature_sensor Chamber]
sensor_pin: PA1
sensor_type: EPCOS 100K B57560G104F
min_temp: 0
max_temp: 120

#####################################################################
# Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 72000

#[safe_z_home]
#home_xy_position: 120,120
#speed: 50.0
#z_hop: 5



[bed_screws]
screw1: 58.5, 5
screw1_name: front screw
screw2: 3,113
screw2_name: back left
screw3: 114,113
screw3_name: back right

#####################################################################
# Neopixel
#####################################################################

#[neopixel board_rgb]
#pin: PC9
#chain_count: 35
#color_order: GRB
#initial_RED: 0.2
#initial_GREEN: 0.2
#initial_BLUE: 0.2

#####################################################################
#   Simple V0 Display
#####################################################################

[display]
lcd_type: sh1106
click_pin: ^!PA15
i2c_bus: i2c1a
i2c_mcu: mcu
encoder_pins: ^PC1, ^PC2
kill_pin: ^!PB12
vcomh: 60
x_offset: 2
#sda: pb9
#scl: pb8

[neopixel display_led]
pin: PC6
color_order: GRB
initial_RED: 0
initial_GREEN: 0.0
initial_BLUE: 0.01


